short_bio: >-
  <p>
    Hi! I am Jaeyong Ko, an M.S. student in Industrial Engineering at Seoul
    National University, advised by
    <a href="https://dsba.snu.ac.kr/professor/" target="_blank">Prof. Pilsung Kang</a>
    in the
    <a href="https://dsba.snu.ac.kr/" target="_blank">Data Science &amp; Business Analytics Lab</a>.
  </p>
  <p>
    My research interests are in large language models, with a focus on
    mathematical reasoning, latent reasoning, and evaluation in the financial
    domain. I am currently interested in latent reasoning in vision-language
    models, especially how models reason beyond text-token reasoning traces.
  </p>

